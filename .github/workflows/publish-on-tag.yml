name: Publish to PyPI (on tag)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build & publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run linting
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -q --no-cov

      - name: Build distributions
        run: uv build

      - name: Smoke test built wheel
        run: bash scripts/smoke-wheel-install.sh

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish --check-url https://pypi.org/simple

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY' > release-notes.md
          import os
          import re
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)"
          match = re.search(pattern, changelog, flags=re.MULTILINE | re.DOTALL)
          if match:
              print(match.group(0).strip())
          else:
              print(f"Release {tag}")
          PY

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "pmcgrab ${GITHUB_REF_NAME#v}" \
              --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "pmcgrab ${GITHUB_REF_NAME#v}" \
              --notes-file release-notes.md
          fi
